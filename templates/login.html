<!DOCTYPE html>
<html lang="en">
<head>
    <title>SSB Training And Placement Pvt Ltd</title>
    <link rel="icon" href="/static/media/logo.jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f2937, #2563eb);
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(0,0,0,0.85) !important;
        }

        .hero-section {
            min-height: 90vh;
            display: flex;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 3rem;
            font-weight: 700;
            color: white;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: #d1d5db;
        }

        .login-card {
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .login-card .btn-dark {
            background: linear-gradient(to right, #111827, #1f2937);
            border: none;
        }

        .login-card .btn-dark:hover {
            opacity: 0.9;
        }
        /* ===== Login Button ===== */
.btn-login {
    background: linear-gradient(45deg, #2563EB, #1E40AF);
    color: white;
    font-weight: 600;
    padding: 9px 22px;
    border-radius: 10px;
    border: none;
    transition: all 0.3s ease;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(37, 99, 235, 0.4);
    color: white;
}

/* ===== Explore Button ===== */
.explore-btn {
    font-weight: 600;
    border-radius: 10px;
    padding: 12px 28px;
    transition: all 0.3s ease;
}

.explore-btn:hover {
    background-color: white;
    color: #1E40AF !important;
    transform: translateY(-2px);
}

/* ===== Background Video ===== */
.bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay for readability */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.75);
    z-index: -1;
}
    </style>
</head>

<body>
<video autoplay muted loop playsinline class="bg-video">
    <source src="/static/media/P.mp4" type="video/mp4">
</video>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            <img src="static/media/logo.jpeg" width="60" class="me-2">
            SSB Training And Placement Pvt Ltd
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav ms-auto">
               <li class="nav-item">
               <a class="nav-link" href="/courses"><b>Courses</b></a></li>
                <li class="nav-item"><a class="nav-link" href="#"><b>Practice</b></a></li>
                <li class="nav-item"><a class="nav-link" href="#"><b>About</b></a></li>
                <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                  <a class="btn btn-login" href="#loginBox">Login</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- HERO SECTION -->
<section class="hero-section">
    <div class="container">
        <div class="row align-items-center">

            <!-- LEFT SIDE -->
            <div class="col-lg-6 text-center text-lg-start hero-text mb-5 mb-lg-0">
                <h1>Be Future-Proof</h1>
                <p class="mt-3">
                    Master coding skills and build your career in tech.
                </p>
               <a href="#" class="btn btn-outline-light btn-lg mt-4 explore-btn">
    Explore Courses
</a>
            </div>

            <!-- RIGHT SIDE LOGIN -->
            <div class="col-lg-5 offset-lg-1">
                <div class="card shadow-lg p-4 login-card bg-white" id="loginBox">

                    <h3 class="text-center mb-4 fw-bold">Login</h3>

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input name="username" type="text"
                                   class="form-control"
                                   placeholder="Enter username" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input name="password" type="password"
                                   class="form-control"
                                   placeholder="Enter password" required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100">
                            Login
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

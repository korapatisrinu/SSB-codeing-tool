<!DOCTYPE html>
<html>
<head>
<title>SSB Training And Placement Pvt Ltd</title>

<link rel="icon" type="image/png" href="static/media/logo.jpeg">

<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<!-- ===== NAVBAR ===== -->

<div class="nav">

    <!-- LOGO -->
    <a href="index.html">
        <img src="static/media/logo.jpeg" alt="Logo" width="90" />
    </a>
    <h2 class="logo">SSB Training And Placement Pvt Ltd </h2>

   <div class="nav-links">
    <a href="#" class="nav-btn">Courses</a>
    <a href="#" class="nav-btn">Practice</a>
    <a href="#" class="nav-btn">About</a>
</div>

 

        <!-- Scroll to login -->
        <a href="#loginBox" class="login-btn">Login</a>


</div>

<!-- ===== HERO SECTION ===== -->

<div class="hero">

    <!-- LEFT TEXT -->

    <div class="hero-text">

        <h1>Be Future-Proof</h1>

        <p>
            Master coding skills and build your career in tech
        </p>

    </div>


   <!-- RIGHT LOGIN BOX -->

    <div class="login-box" id="loginBox">

        <h2>Login</h2>

        <!-- ⭐ ERROR MESSAGE FROM FLASK -->
        {% if error %}
        <p style="color:red; font-weight:bold;">
            {{ error }}
        </p>
        {% endif %}

        <form method="POST">

            <label>Username</label>
            <input
                name="username"
                type="text"
                placeholder="Enter username"
                required
                autocomplete="username"
            >

            <label>Password</label>
            <input
                name="password"
                type="password"
                placeholder="Enter password"
                required
                autocomplete="current-password"
            >

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>{{ problem[1] }}</title>
<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<div class="navbar">
    <h2>{{ problem[1] }}</h2>
    <a href="/dashboard">
        
        <button class="logout-btn" type="button">Back</button>
    </a>
</div>
<div class="nav-actions">
    <button onclick="toggleTheme()">🌙 / ☀</button>
</div>

<div class="main">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <h2>Problem</h2>

        <!-- ✅ This preserves formatting -->
        <div style="white-space: pre-wrap;">
            {{ problem[2] }}
        </div>

    </div>

    <!-- RIGHT PANEL -->

  <div class="right-panel">

    <!-- 🔹 Code Editor Header + Language Dropdown -->
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>💻 Code Editor</h3>

        <select id="language" onchange="changeTemplate()" style="padding:6px;">
            <option value="python">Python 3</option>
            <option value="java">Java 17</option>
        </select>
    </div>

    <!-- 🔹 Code Area -->
    <textarea id="code" style="
        width:100%;
        height:400px;
        background:#1e1e1e;
        color:white;
        font-family:monospace;
        padding:15px;
        border:none;
        outline:none;
        resize:none;">
    </textarea>

        <button type="button" onclick="toggleInput()">
            Custom Input
        </button>

        <div id="inputBox" style="display:none; margin-top:10px;">
            <h4>Input (for Run)</h4>
            <textarea id="stdin"
            placeholder="Example:
2
3"
            style="width:100%; height:100px;"></textarea>
        </div>

        <div class="buttons">
            <button type="button" onclick="runCode()">▶ Run</button>
            <button type="button" onclick="executeCode()">⚡ Execute</button>
            <button type="button" onclick="submitCode()">🚀 Submit</button>
        </div>

        <h3>Output</h3>

        <textarea id="output"
        readonly
        style="width:100%; height:160px; background:black; color:lime;"></textarea>

    </div>

</div>



<!-- <! SCRIPT> -->
<script>

function toggleInput(){
    const box = document.getElementById("inputBox");
    box.style.display = (box.style.display === "none") ? "block" : "none";
}

function runCode(){
    const code = document.getElementById("code").value;
    const stdin = document.getElementById("stdin").value;
    const language = document.getElementById("language").value;

    document.getElementById("output").value = "Running...";

    fetch("/run", {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body:
    "code=" + encodeURIComponent(code)
    + "&stdin=" + encodeURIComponent(stdin)
    + "&language=" + encodeURIComponent(language)
    + "&pid={{ problem[0] }}"
    })
    .then(r => r.text())
    .then(d => document.getElementById("output").value = d)
    .catch(err => document.getElementById("output").value = err);
}

function executeCode(){
    const code = document.getElementById("code").value;
    const language = document.getElementById("language").value;

    document.getElementById("output").value = "Executing test cases...";

    fetch("/execute/{{ problem[0] }}", {
        method:"POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body:
            "code=" + encodeURIComponent(code)
            + "&language=" + encodeURIComponent(language)
    })
    .then(r=>r.text())
    .then(d=>document.getElementById("output").value = d)
    .catch(err=>document.getElementById("output").value = err);
}

function submitCode() {
    const code = document.getElementById("code").value;
    const language = document.getElementById("language").value;

    document.getElementById("output").value = "Submitting...";

    fetch("/submit/{{ problem[0] }}", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body:
            "code=" + encodeURIComponent(code)
            + "&language=" + encodeURIComponent(language)
    })
    .then(response => response.text())
    .then(data => {

        const parts = data.split("|");

        const verdict = parts[0];
        const passed = parts[1];
        const total = parts[2];
        const nextId = parts[3];

        document.getElementById("output").value =
            verdict + " — " + passed + "/" + total + " Passed";

        const oldBtn = document.getElementById("nextBtn");
        if (oldBtn) oldBtn.remove();

        if (verdict === "Accepted" && nextId && nextId !== "None") {

            const nextBtn = document.createElement("button");

            nextBtn.id = "nextBtn";
            nextBtn.innerText = "➡ Next Problem";
            nextBtn.className = "logout-btn";
            nextBtn.style.marginTop = "12px";

            nextBtn.onclick = function() {
                window.location.href = "/problem/" + nextId;
            };

            document.querySelector(".right-panel").appendChild(nextBtn);
        }

    })
    .catch(error => {
        document.getElementById("output").value = "Error: " + error;
    });
}

function changeTemplate() {

    const lang = document.getElementById("language").value;
    const code = document.getElementById("code");

    if (lang === "python") {
        code.value =
`# Enter your code here. Read input from STDIN. Print output to STDOUT

# Write your logic here
`;
    }

    else if (lang === "java") {
        code.value =
`import java.util.*;

public class Main {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        // Write your logic here
    
    }
}`;
    }
}

window.onload = changeTemplate;
function toggleTheme() {
    const body = document.body;

    body.classList.toggle("dark");

    if (body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Load saved theme when page opens
window.onload = function() {

    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
        document.body.classList.add("dark");
    }

    if (typeof changeTemplate === "function") {
        changeTemplate();
    }
};



</script>

</body>
</html>

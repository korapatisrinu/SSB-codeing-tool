<!DOCTYPE html>
<html lang="en">
<head>

<title>{{ problem[1] }}</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
}

/* NAVBAR */

.navbar{
background:#1e293b;
}

/* LEFT PANEL */

.problem-box{
background:#1e293b;
padding:20px;
border-radius:10px;
height:80vh;
overflow:auto;
}

/* RIGHT PANEL */

.editor-box{
background:#1e293b;
padding:20px;
border-radius:10px;
}

/* EDITOR */

#editor{
height:420px;
border-radius:8px;
}

/* TERMINAL OUTPUT */

.terminal{
background:black;
color:#00ff00;
font-family:Consolas,monospace;
padding:15px;
border-radius:8px;
height:200px;
overflow-y:auto;
border:1px solid #333;
margin-top:10px;
}

#output{
white-space:pre-wrap;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark px-4">

<span class="navbar-brand fw-bold">
{{ problem[1] }}
</span>

<a href="/dashboard" class="btn btn-danger btn-sm">
Back
</a>

</nav>


<div class="container-fluid mt-4">

<div class="row g-4">

<!-- LEFT SIDE : PROBLEM -->

<div class="col-md-4">

<div class="problem-box">

<h4>📄 Problem</h4>

<hr>

<div style="white-space: pre-wrap;">
{{ problem[2] }}
</div>

</div>

</div>


<!-- RIGHT SIDE : EDITOR -->

<div class="col-md-8">

<div class="editor-box">

<div class="d-flex justify-content-between align-items-center mb-3">

<h4>💻 Code Editor</h4>

<select id="language"
class="form-select w-auto"
onchange="changeTemplate()">

<option value="python">Python 3</option>
<option value="java">Java 17</option>

</select>

</div>

<!-- MONACO EDITOR -->

<div id="editor"></div>


<button class="btn btn-secondary mt-3"
onclick="toggleInput()">
Custom Input
</button>


<div id="inputBox" style="display:none;" class="mt-3">

<h6>Input</h6>

<textarea id="stdin"
class="form-control"
style="height:100px;"
placeholder="Example:
2
3"></textarea>

</div>


<!-- BUTTONS -->

<div class="mt-3 d-flex gap-2">

<button class="btn btn-warning"
onclick="runCode()">▶ Run</button>

<button class="btn btn-info"
onclick="executeCode()">⚡ Execute</button>

<button class="btn btn-success"
onclick="submitCode()">🚀 Submit</button>

</div>


<h5 class="mt-4">Terminal Output</h5>

<div class="terminal">
<div id="output"></div>
</div>

</div>

</div>

</div>

</div>


<script>

let editor;

/* MONACO EDITOR */

require.config({
paths:{'vs':'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs'}
});

require(['vs/editor/editor.main'], function () {

editor = monaco.editor.create(document.getElementById('editor'), {

value:"",
language:"python",
theme:"vs-dark",
fontSize:14,
minimap:{enabled:false},
automaticLayout:true

});

changeTemplate();

});


function toggleInput(){

const box=document.getElementById("inputBox");

box.style.display=(box.style.display==="none")?"block":"none";

}


/* RUN CODE */

function runCode(){

const code = editor.getValue();
const stdin = document.getElementById("stdin").value;
const language = document.getElementById("language").value;

let terminal = document.getElementById("output");

terminal.innerText = "$ Running...\n\n";

fetch("/run",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:
"code="+encodeURIComponent(code)
+"&stdin="+encodeURIComponent(stdin)
+"&language="+encodeURIComponent(language)
+"&pid={{ problem[0] }}"

})

.then(r=>r.text())

.then(d=>{

let inputs = stdin.trim().split("\n");

let display = "";

for(let i=0;i<inputs.length;i++){

}

terminal.innerText =
display +
"\nOutput:\n" +
d;

})

.catch(err=>{

terminal.innerText = "Error:\n"+err;

});

}
/* EXECUTE */

function executeCode(){

const code=editor.getValue();
const language=document.getElementById("language").value;

document.getElementById("output").innerText="Executing test cases...\n";

fetch("/execute/{{ problem[0] }}",{

method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},

body:
"code="+encodeURIComponent(code)
+"&language="+encodeURIComponent(language)

})
.then(r=>r.text())
.then(d=>document.getElementById("output").innerText=d);

}


/* SUBMIT */
function submitCode(){

const code = editor.getValue();
const language = document.getElementById("language").value;

document.getElementById("output").innerText = "Submitting...\n";

fetch("/submit/{{ problem[0] }}",{

method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},

body:
"code="+encodeURIComponent(code)
+"&language="+encodeURIComponent(language)

})
.then(response=>response.text())

.then(data=>{

const parts = data.split("|");

const verdict = parts[0];
const passed = parts[1];
const total = parts[2];
const nextId = parts[3];

document.getElementById("output").innerText =
verdict+" — "+passed+"/"+total+" Passed";

const oldBtn = document.getElementById("nextBtn");
const oldDash = document.getElementById("dashBtn");

if(oldBtn) oldBtn.remove();
if(oldDash) oldDash.remove();

/* NEXT PROBLEM BUTTON */

if(verdict==="Accepted" && nextId && nextId!=="None"){

const nextBtn = document.createElement("button");

nextBtn.id="nextBtn";
nextBtn.innerText="➡ Next Problem";
nextBtn.className="btn btn-primary mt-3";

nextBtn.onclick=function(){
window.location.href="/problem/"+nextId;
};

document.querySelector(".editor-box").appendChild(nextBtn);

}

/* DASHBOARD BUTTON */

if(verdict==="Accepted" && (!nextId || nextId==="None")){

const dashBtn = document.createElement("button");

dashBtn.id="dashBtn";
dashBtn.innerText="🏠 Back to Dashboard";
dashBtn.className="btn btn-success mt-3";

dashBtn.onclick=function(){
window.location.href="/dashboard";
};

document.querySelector(".editor-box").appendChild(dashBtn);

}

})

.catch(error=>{

document.getElementById("output").innerText="Error: "+error;

});

}
/* LANGUAGE TEMPLATE */

function changeTemplate(){

const lang=document.getElementById("language").value;

const model=editor.getModel();

if(lang==="python"){

monaco.editor.setModelLanguage(model,"python");

editor.setValue(`# Enter your code here. Read input from STDIN. Print output to STDOUT

# Write your logic here
`);

}

else if(lang==="java"){

monaco.editor.setModelLanguage(model,"java");

editor.setValue(`import java.util.*;

public class Main {

public static void main(String[] args){

Scanner sc=new Scanner(System.in);

// Write your logic here

}

}`);
}

}

</script>

</body>
</html>

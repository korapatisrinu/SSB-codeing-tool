<!DOCTYPE html>
<html>
<head>
<title>Edit Problem</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h3>Edit Problem</h3>

<form method="POST">

<div class="mb-3">
<label>Title</label>
<input name="title" class="form-control" value="{{ problem[1] }}">
</div>

<div class="mb-3">
<label>Description</label>
<textarea name="description" class="form-control" rows="6">{{ problem[2] }}</textarea>
</div>

<h5 class="mt-4">Test Cases</h5>

{% for i in range(5) %}

<div class="row mb-3">

<div class="col-md-6">

<textarea name="input{{i+1}}" class="form-control" rows="2"
placeholder="Input {{i+1}}">
{% if tests|length > i %}{{ tests[i][0] }}{% endif %}
</textarea>

</div>

<div class="col-md-6">

<textarea name="output{{i+1}}" class="form-control" rows="2"
placeholder="Output {{i+1}}">
{% if tests|length > i %}{{ tests[i][1] }}{% endif %}
</textarea>

</div>

</div>

{% endfor %}

<button class="btn btn-success">Update Problem</button>
<a href="/admin" class="btn btn-secondary">Cancel</a>

</form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contest Problems</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    background: linear-gradient(135deg,#1e2a78,#4a6cf7);
    font-family: 'Segoe UI', sans-serif;
}

.navbar{
    background: linear-gradient(90deg,#0f2027,#203a43,#2c5364);
}

.card{
    border-radius: 15px;
    border: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.problem-item{
    transition: 0.3s;
}

.problem-item:hover{
    transform: translateX(5px);
    background-color: #f1f3ff;
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            🏁 Contest Problems
        </span>

        <div class="d-flex gap-2">
            <a href="/dashboard" class="btn btn-light btn-sm">
                <i class="bi bi-arrow-left"></i> Dashboard
            </a>

            <a href="/leaderboard/{{ cid }}" class="btn btn-warning btn-sm">
                🏆 Leaderboard
            </a>
        </div>
    </div>
</nav>


<div class="container my-5">

    <div class="card p-4">

        <h3 class="mb-4 text-center">
            Contest Problem List
        </h3>

        <div class="list-group">

            {% for p in problems %}
            <a href="/problem/{{ p[0] }}"
               class="list-group-item list-group-item-action d-flex justify-content-between align-items-center problem-item">

                <span class="fw-semibold">
                    Problem {{ loop.index }} — {{ p[1] }}
                </span>

                <span class="badge bg-primary rounded-pill">
                    Solve ➜
                </span>

            </a>
            {% endfor %}

        </div>

    </div>

</div>

</body>
</html>
